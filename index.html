<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noodle Wisdom</title>
    <style>
        /* Modern reset and centering */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fdf6e3; /* Soft noodle-ish background */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #2c3e50;
        }

        .quote-container {
            text-align: center;
            padding: 20px;
            max-width: 80%;
        }

        blockquote {
            font-size: 3rem;
            font-weight: 700;
            margin: 0;
            font-style: italic;
            position: relative;
            display: inline-block;
        }

        /* Decorative quotation marks */
        blockquote::before {
            content: "“";
            font-size: 5rem;
            color: #e67e22;
            position: absolute;
            left: -40px;
            top: -20px;
            opacity: 0.3;
        }

        cite {
            display: block;
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: 300;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        cite::before {
            content: "— ";
        }
    </style>
</head>
<body>

    <div class="quote-container">
        <blockquote cite="Mihir">
            I love noodles
        </blockquote>
        <cite>Mihir</cite>
    </div>

</body>
</html>
